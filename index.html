<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cassmcxi — Games</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;color:#eee;gap:40px;padding:40px 20px}
h1{font-size:2rem;letter-spacing:6px;color:#f0a0c0;text-transform:uppercase}
p{color:#7060a0;letter-spacing:2px;font-size:.85rem}
.games{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.card{background:#16213e;border-radius:16px;padding:32px 28px;text-align:center;text-decoration:none;color:#eee;transition:transform .15s,background .15s;border:1px solid #2a2050;width:200px}
.card:hover{transform:translateY(-4px);background:#1e2d50}
.card .icon{font-size:3rem;margin-bottom:16px}
.card h2{font-size:1.1rem;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.card p{font-size:.78rem;color:#8070a0;line-height:1.5;letter-spacing:0}
.tag{display:inline-block;margin-top:12px;font-size:.7rem;padding:3px 10px;border-radius:20px;background:#f0a0c020;color:#f0a0c0;letter-spacing:1px}
</style>
</head>
<body>
<div>
  <h1>cassmcxi</h1>
  <p style="text-align:center;margin-top:8px">browser games</p>
</div>
<div class="games">
  <a class="card" href="aura.html">
    <div class="icon">🏰</div>
    <h2>AURA</h2>
    <p>Pixel art adventure. Play as a knight and explore a haunted castle world.</p>
    <span class="tag">arrow keys + space</span>
  </a>
  <a class="card" href="tictactoe.html">
    <div class="icon">✕</div>
    <h2>Tic Tac Toe</h2>
    <p>Classic two-player game with score tracking.</p>
    <span class="tag">2 players</span>
  </a>
</div>
</body>
</html>
